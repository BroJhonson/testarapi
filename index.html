<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal API Client - Premium UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside>
            <div class="logo">
                <i data-lucide="zap"></i>
                <span>Nexus API</span>
            </div>
            
            <div class="history-section">
                <h3 class="section-title">Histórico Recente</h3>
                <div id="history-list">
                    <!-- History items will be injected here -->
                </div>
                <div class="sidebar-actions" style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                    <button id="export-history" class="btn-sidebar" title="Exportar histórico como JSON">Exportar</button>
                    <button id="import-history" class="btn-sidebar" title="Importar histórico de um arquivo JSON">Importar</button>
                    <button id="clear-history" class="btn-sidebar" title="Limpar todo o histórico">Limpar</button>
                    <input type="file" id="import-file" accept="application/json" style="display: none;" />
                </div>
            </div>

            <div class="footer-sidebar">
                <div class="section-title" style="margin-top: auto;">Ambiente</div>
                <div style="font-size: 0.8rem; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="globe" size="14"></i>
                    <span>Produção (Global)</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main>
            <div class="animate-fade">
                <h1 style="font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 600;">Nova Requisição</h1>
                
                <div class="request-bar">
                    <select id="method">
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                        <option value="PATCH">PATCH</option>
                    </select>
                    <input type="text" id="url" placeholder="https://api.exemplo.com/v1/recurso" value="https://jsonplaceholder.typicode.com/posts/1">
                    <button class="btn-send" onclick="sendRequest()">
                        <span>Enviar</span>
                        <i data-lucide="send" size="18" style="vertical-align: middle; margin-left: 4px;"></i>
                    </button>
                </div>
            </div>

            <div class="request-config animate-fade" style="animation-delay: 0.1s;">
                <div class="tabs">
                    <div class="tab active" data-tab="params">Parâmetros</div>
                    <div class="tab" data-tab="headers">Headers</div>
                    <div class="tab" data-tab="body">Corpo (JSON)</div>
                    <div class="tab" data-tab="auth">Auth</div>
                </div>

                <div id="params-content" class="tab-content">
                    <div id="params-list">
                        <div class="key-value-row">
                            <input type="text" placeholder="Chave" class="param-key">
                            <input type="text" placeholder="Valor" class="param-value">
                            <button onclick="addRow('params-list')" style="background: transparent; border: none; color: var(--accent-primary); cursor: pointer;"><i data-lucide="plus-circle"></i></button>
                        </div>
                    </div>
                </div>

                <div id="headers-content" class="tab-content" style="display: none;">
                    <div id="headers-list">
                        <div class="key-value-row">
                            <input type="text" placeholder="Content-Type" class="header-key" value="application/json">
                            <input type="text" placeholder="application/json" class="header-value" value="application/json">
                            <button onclick="addRow('headers-list')" style="background: transparent; border: none; color: var(--accent-primary); cursor: pointer;"><i data-lucide="plus-circle"></i></button>
                        </div>
                    </div>
                </div>

                <div id="body-content" class="tab-content" style="display: none;">
                    <textarea id="request-body" style="width: 100%; min-height: 200px; background: #0b1120; color: var(--text-primary); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; font-family: 'JetBrains Mono', monospace; outline: none;" placeholder='{ "id": 1, "name": "Nexus" }'></textarea>
                </div>
                <!-- Auth Tab Content -->
                <div id="auth-content" class="tab-content" style="display: none;">
                    <div class="key-value-row" style="margin-bottom: 0.5rem;">
                        <label for="auth-type" style="color: var(--text-secondary); margin-right: 0.5rem;">Tipo:</label>
                        <select id="auth-type" style="background: transparent; color: var(--text-primary); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.4rem 0.6rem;">
                            <option value="bearer">Bearer Token</option>
                            <option value="basic">Basic Auth (Base64)</option>
                        </select>
                    </div>
                    <input type="text" id="auth-token" placeholder="Token ou credenciais" style="width: 100%; background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.6rem 1rem; margin-top: 0.5rem;" />
                </div>
            </div>

            <div id="response-area" class="response-container animate-fade" style="display: none; animation-delay: 0.2s;">
                <div class="response-header">
                    <h2 style="font-size: 1.1rem; color: var(--text-secondary);">Resposta</h2>
                    <div id="status-container" class="status-badge status-success">
                        200 OK
                    </div>
                </div>
                <div id="response-meta" style="margin-bottom: 1rem; font-size: 0.8rem; color: var(--text-secondary); display: flex; gap: 1rem;">
                    <span>Tempo: <b id="response-time">45ms</b></span>
                    <span>Tamanho: <b id="response-size">1.2 KB</b></span>
                </div>
                <pre id="response-body">{ "message": "Carregando..." }</pre>
            </div>

            <!-- Loader -->
            <div id="loader" style="display: none; justify-content: center; padding: 3rem;">
                <div class="loader-spinner" style="width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </div>
        </main>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
        
        // Tab switching logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const target = tab.getAttribute('data-tab');
                document.getElementById('params-content').style.display = target === 'params' ? 'block' : 'none';
                document.getElementById('headers-content').style.display = target === 'headers' ? 'block' : 'none';
                document.getElementById('body-content').style.display = target === 'body' ? 'block' : 'none';
            });
        });

        function addRow(containerId) {
            const container = document.getElementById(containerId);
            const row = document.createElement('div');
            row.className = 'key-value-row';
            row.innerHTML = `
                <input type="text" placeholder="Chave" class="${containerId.replace('-list', '')}-key">
                <input type="text" placeholder="Valor" class="${containerId.replace('-list', '')}-value">
                <button onclick="this.parentElement.remove()" style="background: transparent; border: none; color: var(--error); cursor: pointer;"><i data-lucide="minus-circle"></i></button>
            `;
            container.appendChild(row);
            lucide.createIcons();
        }
    </script>
</body>
</html>
